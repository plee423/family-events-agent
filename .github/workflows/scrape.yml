name: Scrape Events

on:
  schedule:
    # 2 AM Chicago time (UTC-6 winter / UTC-5 summer) → 8 AM UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Only one run at a time — cancel any in-progress run when a new one starts
concurrency:
  group: scrape-events
  cancel-in-progress: true

permissions:
  contents: write # Needed to commit outputs back to the repo

jobs:
  # ── Chicago and Irvine scrape in parallel ─────────────────────────────────────

  scrape-chicago:
    name: Scrape Chicago
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            playwright install chromium
          else
            playwright install chromium --with-deps
          fi

      - name: Scrape Chicago events
        run: python agent.py run --no-cache
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}

      - name: Debug Chicago output files
        run: ls -la output/ && echo "---" && head -3 output/events_chicago.json 2>/dev/null || echo "events_chicago.json NOT FOUND"

      - name: Upload Chicago outputs
        uses: actions/upload-artifact@v4
        with:
          name: chicago-output
          path: output/
          retention-days: 1

      - name: Upload Chicago geocode cache
        uses: actions/upload-artifact@v4
        with:
          name: chicago-geocache
          path: cache/geocode_cache.json
          if-no-files-found: ignore
          retention-days: 1

  scrape-irvine:
    name: Scrape Irvine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            playwright install chromium
          else
            playwright install chromium --with-deps
          fi

      - name: Scrape Irvine events
        run: python agent.py run --location irvine --no-cache
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}

      - name: Upload Irvine outputs
        uses: actions/upload-artifact@v4
        with:
          name: irvine-output
          path: output/
          retention-days: 1

      - name: Upload Irvine geocode cache
        uses: actions/upload-artifact@v4
        with:
          name: irvine-geocache
          path: cache/geocode_cache.json
          if-no-files-found: ignore
          retention-days: 1

  # ── Commit both cities' outputs once both scrapes finish ─────────────────────

  commit-outputs:
    name: Commit outputs to repo
    runs-on: ubuntu-latest
    needs: [scrape-chicago, scrape-irvine]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history — shallow clones can break rebase in edge cases

      - name: Download Chicago outputs
        uses: actions/download-artifact@v4
        with:
          name: chicago-output
          path: output/

      - name: Download Irvine outputs
        uses: actions/download-artifact@v4
        with:
          name: irvine-output
          path: output/

      - name: Download Chicago geocode cache
        uses: actions/download-artifact@v4
        with:
          name: chicago-geocache
          path: cache-chicago/
        continue-on-error: true

      - name: Download Irvine geocode cache
        uses: actions/download-artifact@v4
        with:
          name: irvine-geocache
          path: cache-irvine/
        continue-on-error: true

      - name: Merge geocode caches
        run: |
          python - <<'EOF'
          import json, os
          merged = {}
          for f in ["cache-chicago/geocode_cache.json", "cache-irvine/geocode_cache.json"]:
              if os.path.exists(f):
                  with open(f) as fh:
                      merged.update(json.load(fh))
          if merged:
              os.makedirs("cache", exist_ok=True)
              with open("cache/geocode_cache.json", "w") as fh:
                  json.dump(merged, fh, indent=2)
              print(f"Merged geocode cache: {len(merged)} entries")
          else:
              print("No geocode cache files found — keeping committed copy")
          EOF

      - name: Copy outputs to public/
        run: |
          mkdir -p public
          cp output/events_chicago.json public/ 2>/dev/null || true
          cp output/events_irvine.json  public/ 2>/dev/null || true
          cp output/events_chicago.html public/ 2>/dev/null || true
          cp output/events_irvine.html  public/ 2>/dev/null || true
          # ICS files use date-stamped names — copy the most recent one
          ls -t output/*.ics 2>/dev/null | head -1 | xargs -I{} cp {} public/events_chicago.ics 2>/dev/null || true
          ls -t output/events_irvine*.ics 2>/dev/null | head -1 | xargs -I{} cp {} public/events_irvine.ics 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ output/ cache/geocode_cache.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: update events $(date -u +%Y-%m-%d)"

          # fetch-rebase-push: always fetch latest before pushing.
          # Failure window is milliseconds (between rebase and push), not minutes.
          # -X theirs: on conflict, take our version (fresh scrape always wins).
          for attempt in 1 2 3; do
            git fetch origin master
            git rebase -X theirs origin/master || { git rebase --abort; echo "Rebase failed"; exit 1; }
            git push origin master && exit 0
            echo "Push attempt $attempt failed (remote advanced between rebase and push)"
          done
          echo "Push failed after 3 attempts"; exit 1

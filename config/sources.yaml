sources:

  # ─── LIBRARIES ───────────────────────────────────────────────────────────────
  # CPL uses the Bibliocommons JSON API — much more reliable than HTML scraping.

  - name: "Chicago Public Library"
    org_type: "library"
    url: "https://gateway.bibliocommons.com/v2/libraries/chipublib/events"
    scraper: "bibliocommons"
    library_id: "chipublib"
    audiences: "babies_and_toddlers"
    max_pages: 50
    tags: ["storytime", "library", "baby", "toddler", "reading"]
    age_hint: "0-60 months"
    cost: "free"

  - name: "Chicago Public Library - Harold Washington"
    org_type: "library"
    url: "https://gateway.bibliocommons.com/v2/libraries/chipublib/events"
    scraper: "bibliocommons"
    library_id: "chipublib"
    audiences: "babies_and_toddlers"
    branch_filter: ["Harold Washington"]
    max_pages: 50
    tags: ["storytime", "library", "baby", "toddler", "reading"]
    age_hint: "0-60 months"
    cost: "free"

  - name: "Chicago Public Library - Near North"
    org_type: "library"
    url: "https://gateway.bibliocommons.com/v2/libraries/chipublib/events"
    scraper: "bibliocommons"
    library_id: "chipublib"
    audiences: "babies_and_toddlers"
    branch_filter: ["Near North"]
    max_pages: 50
    tags: ["storytime", "library", "baby", "toddler", "reading"]
    age_hint: "0-60 months"
    cost: "free"

  # ─── MUSEUMS ─────────────────────────────────────────────────────────────────

  - name: "Field Museum - Free Wednesdays"
    org_type: "museum"
    url: "https://www.fieldmuseum.org/our-events/free-wednesdays"
    scraper: "html"
    selectors:
      event_card: "a.card-event-link"
      title: "span.block"
      date: "h6.h6"
      location: ""
      link: "self"        # the card itself is the <a> tag
    tags: ["museum", "free-day", "science", "family"]
    cost: "free (IL residents)"
    notes: "Illinois residents free every Wednesday"

  - name: "Field Museum - Events"
    org_type: "museum"
    url: "https://www.fieldmuseum.org/our-events"
    scraper: "html"
    selectors:
      event_card: "li.event-card"
      title: "a.h4"
      date: "h6.h6"
      location: ""
      link: "a.h4"
    tags: ["museum", "science", "family"]
    cost: ""

  - name: "Art Institute of Chicago - Events"
    org_type: "museum"
    url: "https://www.artic.edu/events"
    scraper: "browser"
    selectors:
      event_card: "article, .m-listing, .f-listing, [class*='ListingCard'], [class*='EventCard']"
      title: "h2, h3, [class*='title'], [class*='Title']"
      date: "time, [class*='date'], [class*='Date']"
      location: "[class*='location'], [class*='Location'], .gallery"
      link: "a"
    tags: ["museum", "art", "family"]
    cost: "free (IL residents under 14)"
    notes: "Illinois residents under 14 always free; Chicago teens free"

  - name: "Chicago History Museum - Events"
    org_type: "museum"
    # Switched from browser scraper to Tribe Events REST API (site is JS-rendered).
    # API returns 230+ events with full pagination via next_rest_url.
    url: "https://calendar.chicagohistory.org/wp-json/tribe/events/v1/events?per_page=50"
    scraper: "tribe_events"
    tags: ["museum", "history", "family"]
    cost: "free (IL residents)"

  - name: "National Museum of Mexican Art - Events"
    org_type: "museum"
    url: "https://nationalmuseumofmexicanart.org/events"
    scraper: "browser"
    # NOTE: Site is a custom AREA 17 build (NOT WordPress). All Tribe/WP selectors are wrong.
    # Page may be partially JS-rendered. Selectors below need validation via browser DevTools.
    # No public API or iCal feed found. Try /events.ics manually if this still returns 0.
    selectors:
      event_card: ".Events--listing li, ul li, li"
      title: "a"
      date: "p, span, div"
      location: "p, span, div"
      link: "a"
    tags: ["museum", "free", "culture", "family"]
    cost: "always free"

  - name: "Peggy Notebaert Nature Museum - Events"
    org_type: "museum"
    url: "https://naturemuseum.org/events"
    scraper: "nature_museum"
    # Custom two-pass scraper: index page → collect /events/slug URLs → fetch each for date.
    # Events use bare <a> tags with no CSS classes (headless CMS) — standard selectors fail.
    # Date format on detail pages: "Weekday, Month DD, YYYY, HH:MMam-HH:MMpm"
    max_pages: 5
    tags: ["museum", "nature", "family", "outdoor"]
    age_hint: "0-60 months"
    cost: "varies (free days available)"

  - name: "Chicago Children's Museum - Program Calendar"
    org_type: "museum"
    # Switched from browser scraper to Tockify REST API.
    # The site delegates 100% to a Tockify JS widget — no HTML events exist.
    # Tockify API confirmed working, no auth required.
    # Tockify API does not return per-event URLs — website field used as fallback.
    url: "https://api.tockify.com/api/ngevent"
    scraper: "tockify"
    tockify_calendar: "chicagochildrensmuseum"
    website: "https://chicagochildrensmuseum.org/visit/programs/"
    location_name: "Chicago Children's Museum"
    location_address: "700 E Grand Ave, Chicago, IL 60611"
    max_per_page: 50
    tags: ["museum", "children", "play", "toddler", "family"]
    age_hint: "0-60 months"
    cost: "free first Sunday (Chicago residents)"

  # ─── PARKS & RECREATION ──────────────────────────────────────────────────────

  - name: "Chicago Park District - Toddler Programs"
    org_type: "parks"
    url: "https://anc.apm.activecommunities.com/chicagoparkdistrict/activity/search?activity_select_param=2&viewMode=list&activity_keyword=toddler"
    scraper: "browser"
    wait_selector: ".activity-card"
    selectors:
      event_card: ".activity-card"
      title: ".activity-card-info__name-link a"
      date: ".activity-card-info__dateRange"
      time: ".activity-card-info__timeRange"
      location: ".activity-card-info__location"
      link: ".activity-card-info__name-link a"
      description: ".activity-card-info__ages"
    tags: ["parks", "toddler", "recreation", "classes"]
    age_hint: "0-36 months"

  - name: "Chicago Park District - Baby Programs"
    org_type: "parks"
    # Changed keyword from "infant" to "baby" — "infant" returns 0 results and causes
    # a 15s wait_selector timeout. "baby" returns results with identical selectors.
    url: "https://anc.apm.activecommunities.com/chicagoparkdistrict/activity/search?activity_select_param=2&viewMode=list&activity_keyword=baby"
    scraper: "browser"
    wait_selector: ".activity-card"
    selectors:
      event_card: ".activity-card"
      title: ".activity-card-info__name-link a"
      date: ".activity-card-info__dateRange"
      time: ".activity-card-info__timeRange"
      location: ".activity-card-info__location"
      link: ".activity-card-info__name-link a"
      description: ".activity-card-info__ages"
    tags: ["parks", "baby", "infant", "recreation", "classes"]
    age_hint: "0-18 months"

  # ─── ZOOS & NATURE ───────────────────────────────────────────────────────────

  - name: "Lincoln Park Zoo - Events"
    org_type: "zoo"
    url: "https://www.lpzoo.org/calendar-events/"
    scraper: "browser"
    selectors:
      event_card: ".card__content"
      title: "p.h4 a"
      date: "p.calendar-icon"
      location: "p.person-icon"
      link: "p.h4 a"
    tags: ["zoo", "animals", "family", "free", "outdoor"]
    cost: "always free"
    notes: "LPZ is always free. Dates on their calendar page use recurring descriptions (e.g. 'Mondays in March') not specific dates — events with unparseable dates are skipped."

  # ─── AQUARIUMS & SCIENCE ─────────────────────────────────────────────────────

  # Shedd Aquarium — DISABLED (WAF returns 403 to all HTTP clients including Playwright;
  # even robots.txt is blocked. No iCal or public API found. To re-enable, find the
  # Tessitura TNEW API endpoint via DevTools Network tab on a real browser session.)
  # - name: "Shedd Aquarium - Programs and Events"
  #   org_type: "aquarium"
  #   url: "https://www.sheddaquarium.org/programs-and-events"
  #   scraper: "browser"
  #   tags: ["aquarium", "animals", "family", "science"]
  #   cost: "free (IL residents certain hours)"

  # ─── CULTURAL CENTERS & PARKS ────────────────────────────────────────────────
  # Both Millennium Park and Chicago Cultural Center share the same AEM JSON endpoint.
  # Events are filtered client-side by the 'tags' field.
  # Endpoint confirmed live with ~125 events. Double-JSON-parse handled by chicago_aem scraper.

  - name: "Millennium Park - Events"
    org_type: "parks"
    url: "https://www.chicago.gov/content/city/en/depts/dca/supp_info/events2/jcr:content/parsys/fullcalendar/calendarData"
    scraper: "chicago_aem"
    tag_filter: "Millennium Park"
    tags: ["park", "family", "outdoor", "free", "music"]
    cost: "free"

  - name: "Chicago Cultural Center - Events"
    org_type: "cultural_center"
    url: "https://www.chicago.gov/content/city/en/depts/dca/supp_info/events2/jcr:content/parsys/fullcalendar/calendarData"
    scraper: "chicago_aem"
    tag_filter: "Chicago Cultural Center"
    tags: ["culture", "family", "free", "arts"]
    cost: "always free"

  - name: "Navy Pier - Events"
    org_type: "entertainment"
    url: "https://navypier.org/pier-events/"
    scraper: "browser"
    selectors:
      event_card: "article, [class*='EventCard'], [class*='event-card'], [class*='card']"
      title: "h2, h3, [class*='title'], [class*='Title']"
      date: "time, [class*='date'], [class*='Date']"
      location: "[class*='location'], .venue"
      link: "a"
    tags: ["family", "entertainment", "waterfront"]

  # ─── BOOKSTORES ──────────────────────────────────────────────────────────────

  - name: "The Book Cellar - Events"
    org_type: "bookstore"
    url: "https://www.bookcellarinc.com/calendar"
    scraper: "book_cellar"
    # Custom sequential scraper — server-rendered Drupal calendar, no JS needed.
    # Structure: <h3>Day, Month DD YYYY</h3> date headers + sibling <ul><li> events.
    # Date and events are siblings (not nested) — parse_with_selectors() cannot handle this.
    # No iCal feed available (verified 2026-03-24).
    tags: ["bookstore", "storytime", "reading", "kids", "family"]
    age_hint: "0-60 months"
    cost: "free"

  # ─── EVENTBRITE ──────────────────────────────────────────────────────────────
  # Catches one-off family events from small neighborhood orgs not otherwise scraped.
  # Requires EVENTBRITE_TOKEN env var (free developer account at eventbrite.com/platform).
  # If token is missing the scraper logs a warning and returns 0 events — pipeline continues.

  - name: "Eventbrite - Chicago Family Events"
    org_type: "eventbrite"
    url: "https://www.eventbriteapi.com/v3/events/search/"
    scraper: "eventbrite"
    keywords: "baby toddler storytime family kids infant preschool children lapsit"
    max_pages: 5
    tags: ["family", "community", "kids"]
    age_hint: "0-60 months"

  # ─── REMOVED SOURCES ─────────────────────────────────────────────────────────
  # Griffin MSI — Illinois Free Days:
  #   Domain changed msichicago.org → griffinmsi.org. Site is fully React/JS-rendered.
  #   The free-days page is a static policy page (not a calendar). Remove until a
  #   Playwright scraper or public API is identified on griffinmsi.org.
  #
  # Maggie Daley Park:
  #   maggiedaleypark.com has NO event calendar — it is a purely informational site.
  #   The /events/ page shows seasonal activity status (open/closed), not dated events.
  #   For Maggie Daley programming, use Chicago Park District sources above.

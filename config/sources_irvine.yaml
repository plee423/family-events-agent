# Irvine, CA sources
# Run with: python agent.py run --location irvine
# Scrapes in parallel (ThreadPoolExecutor, max_workers=5) — same as Chicago.
#
# Scraper confidence:
#   ✓ bibliocommons  — verified working (same gateway API as Chicago CPL)
#   ✓ tribe_events   — Pretend City API confirmed 149 events, same pattern as Chicago History Museum
#   ✓ html           — City of Irvine confirmed server-rendered HTML table; Bowers confirmed server-rendered
#   ~ browser        — Discovery Cube is JS/AJAX-rendered; AJAX endpoint unconfirmed — needs DevTools

sources:

  # ── Libraries ─────────────────────────────────────────────────────────────────

  - name: "Irvine Public Library - Events"
    org_type: "library"
    url: "https://gateway.bibliocommons.com/v2/libraries/irvine/events"
    scraper: "bibliocommons"
    library_id: "irvine"
    audiences: "babies_and_toddlers"
    max_pages: 50
    tags: ["storytime", "library", "baby", "toddler", "family"]
    age_hint: "0-60 months"
    cost: "free"

  - name: "Orange County Public Library - Events"
    org_type: "library"
    # OCPL also uses the Bibliocommons gateway API — same platform as CPL and Irvine PL.
    url: "https://gateway.bibliocommons.com/v2/libraries/ocpl/events"
    scraper: "bibliocommons"
    library_id: "ocpl"
    audiences: "babies_and_toddlers"
    max_pages: 50
    tags: ["storytime", "library", "baby", "toddler", "family"]
    age_hint: "0-60 months"
    cost: "free"

  # ── Museums & Children's Venues ───────────────────────────────────────────────

  - name: "Pretend City Children's Museum - Events"
    org_type: "museum"
    # Confirmed working: 149 events across 15 pages (verified 2026-03-24)
    # Same Tribe Events REST API pattern as Chicago History Museum.
    url: "https://www.pretendcity.org/wp-json/tribe/events/v1/events?per_page=50"
    scraper: "tribe_events"
    tags: ["children", "play", "toddler", "museum", "family"]
    age_hint: "0-60 months"

  - name: "Bowers Museum - Family Programs"
    org_type: "museum"
    # Server-rendered Joomla/EventBooking site — confirmed HTML in response (verified 2026-03-24)
    # Structure: sppb-addon grid columns, each has h3.sppb-addon-title + sibling <p> for date/venue
    # Date format: MM-DD-YYYY HH:MM am — handled by dateutil fuzzy parse
    url: "https://www.bowers.org/index.php/programs/family-programs"
    scraper: "html"
    selectors:
      event_card: ".sppb-col-sm-4, .sppb-col-md-4, .sppb-col-lg-4, .sppb-addon-content"
      title: "h3.sppb-addon-title a, h3 a"
      date: "p"
      location: "p + p"
      link: "h3.sppb-addon-title a, h3 a"
    tags: ["museum", "family", "culture", "art"]
    notes: "Joomla EventBooking CMS. Selectors need verification — run test-source if 0 events."

  - name: "Discovery Cube OC - Events"
    org_type: "museum"
    # JS-rendered WordPress site. Event cards load via AJAX after page load (verified 2026-03-24).
    # AJAX endpoint at /wp-admin/admin-ajax.php — exact action param unknown.
    # Playwright will render the page but may time out waiting for cards.
    # NOTE: Low confidence — investigate AJAX calls in DevTools Network tab if 0 events.
    url: "https://www.discoverycube.org/orange-county/events"
    scraper: "browser"
    selectors:
      event_card: ".tribe-events-calendar-list__event, .block-event-calendar article, article"
      title: "h2 a, h3 a, .tribe-event-url"
      date: "time, .tribe-event-date-start, .event-date"
      location: ".tribe-venue, .location"
      link: "h2 a, h3 a"
    tags: ["science", "kids", "family", "stem", "museum"]

  # ── Parks & City Events ───────────────────────────────────────────────────────

  - name: "City of Irvine - Events"
    org_type: "parks"
    # Confirmed server-rendered Drupal site with plain HTML table (verified 2026-03-24).
    # Structure: <table><tr><td>Date range</td><td><a>Title</a></td><td>Location</td></tr>
    # Dates are often ranges (e.g. "January 25–April 12") — dateutil fuzzy parse takes the start date.
    url: "https://www.cityofirvine.org/events"
    scraper: "html"
    selectors:
      event_card: "table tr"
      title: "td:nth-child(2) a"
      date: "td:nth-child(1)"
      location: "td:nth-child(3)"
      link: "td:nth-child(2) a"
    tags: ["park", "family", "outdoor", "city", "recreation"]
    cost: "free"

# Irvine, CA sources
# Run with: python agent.py run --location irvine
# Scrapes in parallel (ThreadPoolExecutor, max_workers=5) — same as Chicago.
#
# Scraper confidence:
#   ✓ bibliocommons  — identical platform to Chicago CPL, confirmed working
#   ✓ tribe_events   — same WP REST API pattern as Chicago History Museum
#   ~ html/browser   — selectors are best-guess; verify with: python agent.py test-source "Name" --location irvine --no-cache

sources:

  # ── Libraries ─────────────────────────────────────────────────────────────────

  - name: "Irvine Public Library - Events"
    org_type: "library"
    url: "https://irvine.bibliocommons.com/v2/events"
    scraper: "bibliocommons"
    tags: ["storytime", "library", "baby", "toddler", "family"]
    cost: "free"
    # Uses same Bibliocommons API as Chicago Public Library — high confidence

  - name: "Orange County Public Library - Events"
    org_type: "library"
    url: "https://ocpl.org/events"
    scraper: "html"
    selectors:
      event_card: "article.views-row, .views-row, .event-item"
      title: "h2 a, h3 a, .event-title a"
      date: "time, .date-display-single, .field-name-field-date"
      location: ".field-name-field-location, .location"
      link: "h2 a, h3 a"
    tags: ["storytime", "library", "baby", "family"]
    cost: "free"

  # ── Museums ───────────────────────────────────────────────────────────────────

  - name: "Pretend City Children's Museum - Events"
    org_type: "museum"
    url: "https://www.pretendcity.org/wp-json/tribe/events/v1/events"
    scraper: "tribe_events"
    field_map:
      events_path: "events"
      title: "title"
      start: "start_date"
      end: "end_date"
      description: "description"
      url: "url"
      venue_name: "venue.venue"
      venue_address: "venue.address"
      cost: "cost"
    tags: ["children", "play", "toddler", "museum", "family"]
    # Tribe Events REST API — same pattern as Chicago History Museum

  - name: "Discovery Cube OC - Events"
    org_type: "museum"
    url: "https://www.discoverycube.org/orange-county/explore/events/"
    scraper: "browser"
    selectors:
      event_card: ".tribe-events-calendar-list__event, article.tribe-event, .event-card"
      title: ".tribe-event-url, h2 a, h3 a"
      date: ".tribe-event-date-start, time"
      location: ".tribe-venue, .location"
      link: ".tribe-event-url, h2 a"
    tags: ["science", "kids", "family", "stem", "museum"]

  - name: "Bowers Museum - Family Programs"
    org_type: "museum"
    url: "https://www.bowers.org/index.php/programs/family-programs"
    scraper: "html"
    selectors:
      event_card: "article, .program-item, .views-row"
      title: "h2 a, h3 a, .field-name-title a"
      date: "time, .date-display-single, .field-name-field-date"
      location: ".field-name-field-location, .location"
      link: "h2 a, h3 a"
    tags: ["museum", "family", "culture", "art"]

  # ── Parks ─────────────────────────────────────────────────────────────────────

  - name: "Irvine Regional Park - Family Programs"
    org_type: "parks"
    url: "https://www.ocparks.com/parks/irvi/programs"
    scraper: "html"
    selectors:
      event_card: ".program-item, article, .views-row, tr"
      title: "h2 a, h3 a, td a, .field-name-title a"
      date: "time, .date-display-single, td:nth-child(2)"
      location: ".field-name-field-location, .location"
      link: "h2 a, h3 a, td a"
    tags: ["park", "family", "outdoor", "nature"]

  # ── Cultural / Arts ───────────────────────────────────────────────────────────

  - name: "UCI Arts - Family Programs"
    org_type: "cultural_center"
    url: "https://www.arts.uci.edu/events"
    scraper: "html"
    selectors:
      event_card: "article.views-row, .tribe-event, .event-item"
      title: "h2 a, h3 a, .tribe-event-url"
      date: ".tribe-event-schedule-details, time, .date-display-single"
      location: ".tribe-venue, .location"
      link: "h2 a, h3 a, .tribe-event-url"
    tags: ["arts", "family", "culture", "university"]

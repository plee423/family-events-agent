# Irvine, CA sources
# Run with: python agent.py run --location irvine
# Scrapes in parallel (ThreadPoolExecutor, max_workers=5) — same as Chicago.
#
# Library note: Irvine PL and OCPL use LibCal (SpringShare) for events — NOT Bibliocommons gateway.
# LibCal iCal URL format: https://library.libcal.com/ical_subscribe.php?src=p&cid=BRANCH_ID
# Each branch has a separate calendar ID; multi-cid in a single URL is NOT supported.

sources:

  # ── Irvine Public Library (3 branches, LibCal iCal) ───────────────────────────
  # Confirmed: Katie Wheeler returns "Toddler Storytime", "Baby Storytime"
  #            Heritage Park returns "Baby Storytime", "Stay and Play"
  # Branch IDs found at irvinepubliclibrary.libcal.com/calendars JS config

  - name: "Irvine Public Library - Heritage Park"
    org_type: "library"
    url: "https://irvinepubliclibrary.libcal.com/ical_subscribe.php?src=p&cid=22833"
    scraper: "ical"
    tags: ["storytime", "library", "baby", "toddler", "family"]
    age_hint: "0-60 months"
    cost: "free"

  - name: "Irvine Public Library - Katie Wheeler"
    org_type: "library"

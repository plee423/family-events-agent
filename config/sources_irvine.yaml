  # ── Museums & Children's Venues ───────────────────────────────────────────────

  - name: "Pretend City Children's Museum - Events"
    org_type: "museum"
    # Confirmed working: 145 events across 3 pages (verified 2026-03-27)
    # Same Tribe Events REST API pattern as Chicago History Museum.
    url: "https://www.pretendcity.org/wp-json/tribe/events/v1/events?per_page=50"
    scraper: "tribe_events"
    tags: ["children", "play", "toddler", "museum", "family"]
    age_hint: "0-60 months"

  - name: "Bowers Museum - Family Programs"
    org_type: "museum"
    # Server-rendered Joomla EventBooking (com_eventbooking). NOT WordPress.
    # Confirmed structure (2026-03-27):
    #   event_card: <div class="sppb-addon-event-list-item">
    #   title:      <h3><a href="...">Title</a></h3>
    #   date:       <div class="event-date">Sep 28 2024</div>
    #   location:   <div class="event-location">Bowers Museum</div>
    # NOTE: As of 2026-03-27, all visible events are from 2024 (past) — no 2026 programs posted yet.
    #       Selectors are correct; will return events once new programs are scheduled.
    url: "https://www.bowers.org/index.php/programs/family-programs"
    scraper: "html"
    selectors:
      event_card: ".sppb-addon-event-list-item"
      title: "h3 a"
      date: ".event-date"
      location: ".event-location"
      link: "h3 a"
    tags: ["museum", "family", "culture", "art"]
    cost: "paid admission"

  - name: "Discovery Cube OC - Events"
    org_type: "museum"
    # JS-rendered WordPress site using The Events Calendar plugin.
    # Tribe Events REST API (/wp-json/tribe/events/v1/events) returned 404 (verified 2026-03-27).
    # Browser scraper required. wait_selector ensures Playwright waits for event cards.
    url: "https://www.discoverycube.org/orange-county/events"
    scraper: "browser"
    wait_selector: ".tribe-events-calendar-list__event"
    selectors:
      event_card: ".tribe-events-calendar-list__event, .block-event-calendar article, article"
      title: "h2 a, h3 a, .tribe-event-url"
      date: "time, .tribe-event-date-start, .event-date"
      location: ".tribe-venue, .location"
      link: "h2 a, h3 a"
    tags: ["science", "kids", "family", "stem", "museum"]
    age_hint: "0-60 months"

  # ── Zoo ───────────────────────────────────────────────────────────────────────

  - name: "Santa Ana Zoo - Events"
    org_type: "zoo"
    # WordPress with Events Manager v7.2.3.1 + ProudCity theme (confirmed 2026-03-27).
    # iCal endpoints both 404. Standard Events Manager HTML selectors don't match ProudCity theme.
    # Switching to browser scraper for robust JS rendering.
    url: "https://www.santaanazoo.org/events/"
    scraper: "browser"
    wait_selector: "article, .event-excerpt, h3"
    selectors:
      event_card: "article, li.event-excerpt, .event-excerpt, .entry"
      title: "h3 a, h2 a, .entry-title a"
      date: "time, .event-date, abbr, .entry-date"
      location: ".event-location, .em-location, address"
      link: "h3 a, h2 a"
    tags: ["zoo", "animals", "family", "outdoor", "kids"]
    age_hint: "0-60 months"
    cost: "paid admission"

  # ── Eventbrite ────────────────────────────────────────────────────────────────
  # Catches one-off family events from small OC orgs not otherwise scraped.
  # Requires EVENTBRITE_TOKEN env var (free developer account at eventbrite.com/platform).
  # Uses /v3/organizers/{id}/events/ — the deprecated /v3/events/search/ is gone (Feb 2020).

  - name: "Eventbrite - Irvine Family Events"
    org_type: "eventbrite"
    url: ""  # unused — org-based API; no location search endpoint
    scraper: "eventbrite"
    # Verified Orange County baby/toddler Eventbrite organizers (as of 2026-03-27).
    org_ids:
      - "120406902391"  # Kindermusik by BEAT Studio — baby music class 0-14 mo, Costa Mesa OC
      - "121040304384"  # Mommy Me Pilates (Evelyn) — postpartum mommy & me, Fullerton OC
      - "17190875632"   # Bella Terra Kids Club — monthly free family events, Huntington Beach OC
    max_pages: 5
    tags: ["family", "community", "kids", "baby", "toddler"]
    age_hint: "0-60 months"

  # ── Parks & City Events ───────────────────────────────────────────────────────

  - name: "City of Irvine - Events"
    org_type: "parks"
    # Server-rendered Drupal site, Date/Event/Location column layout confirmed 2026-03-27.
    # Dates are often ranges (e.g. "January 25–April 12") — dateutil fuzzy parse takes start date.
    url: "https://www.cityofirvine.org/events"
    scraper: "html"
    selectors:
      event_card: "table tr"
      title: "td:nth-child(2) a"
      date: "td:nth-child(1)"
      location: "td:nth-child(3)"
      link: "td:nth-child(2) a"
    tags: ["park", "family", "outdoor", "city", "recreation"]
    cost: "free"

